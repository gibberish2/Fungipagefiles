<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tools | Fungi</title></title>
    <link id="favicon" rel="icon" type="image/png" href="https://codehs.com/uploads/dbf77e4f4711feb9506d37e52b30a2dd">
    
<script> 
    setTheme('ocean') // runs BEFORE theme.js loads 
</script>
<script src="theme.js"></script>


    <link rel="stylesheet" href="style.css">

    <style>
        body { background-color: var(--bg-color); color: white; margin: 0; font-family: 'Comic Sans MS', cursive; }
        .content {
            text-align: center;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .theme-btn {
            padding: 12px 24px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
            color: white;
            background-color: var(--accent-color);
            position: relative;
            transition: transform 0.2s, filter 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            white-space: normal;
            max-width: 90vw;
            word-wrap: break-word;
            overflow: hidden;
        }

        .theme-btn:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <a href="home.html" class="nav-link" title = "Brings you to the home page" alt = "home page navigation button">Home</a>
        <a href="launcher.html" class="nav-link" title = "Brings you to the games page" alt = "games page navigation button">Games</a>
        <a href="tools.html" class="nav-link active" title = "Brings you to the tools page" alt = "tools page navigation button">Tools</a>
        <a href="music.html" class="nav-link" title = "Brings you to the music page" alt = "music page navigation button">Music</a>
        <a href="about.html" class="nav-link" title = "Brings you to the about page" alt = "about page navigation button">About</a>
        <a href="settings.html" class="nav-link" title = "Brings you to the settings page" alt = "settings page navigation button">Settings</a>
    </div>
</nav>

<div class="content">
    <h1>Tools🔨</h1>
    <button class="theme-btn" onclick="window.location.href='quadratic_calculator.html'">
        Quadratic Equation Calculator
    </button>
    <button class="theme-btn" onclick="window.location.href='love_tester.html'">
        Love Tester
    </button>
    <button class="theme-btn" onclick="window.location.href='useless_button.html'">
        Useless Button
    </button>
</div>

<!-- GLOBAL MUSIC POPUP -->
<div id="music-popup" class="popup-player">
    <div class="resizer t"></div><div class="resizer b"></div>
    <div class="resizer l"></div><div class="resizer r"></div>
    <div class="resizer tl"></div><div class="resizer tr"></div>
    <div class="resizer bl"></div><div class="resizer br"></div>

    <div class="popup-header" style="cursor: move;">
        <span id="popup-title">Nothing Playing</span>
        <button onclick="togglePopup(false)" style="background:#DE3412; border-radius:5px; color:white; cursor:pointer; font-weight:bold;">×</button>
    </div>
    
    <div class="popup-controls">
        <button onclick="skip(-10)" class="ctrl-btn">«</button>
        <button id="master-play-btn" onclick="togglePlay()" class="ctrl-btn">▶</button>
        <button onclick="skip(10)" class="ctrl-btn">»</button>
    </div>

    <!-- Fix: forced overflow-x hidden and enabled y-axis scrollbar -->
    <div id="playlist" style="margin-top:10px; max-height: 50vh; overflow-y: auto; overflow-x: hidden; display: flex; flex-direction: column; gap: 10px; width: 100%; box-sizing: border-box;"></div>

    <div style="margin-top: 10px; display: flex; align-items: center; gap: 8px; width: 100%;">
        <span>🎚</span>
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5" oninput="adjustVolume(this.value)" style="flex-grow: 1; accent-color: var(--accent-color);">
    </div>
</div>

<script src="music.js"></script>
<script src="spores.js"></script>

</body>
</html>
