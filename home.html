    <script>
    (function() {
        const themes = {
            ocean:    { '--bg-color': '#0f172a', '--nav-color': '#1e293b', '--accent-color': '#38bdf8' },
            forest:   { '--bg-color': '#064e3b', '--nav-color': '#065f46', '--accent-color': '#34d399' },
            sunset:   { '--bg-color': '#451a03', '--nav-color': '#78350f', '--accent-color': '#fbbf24' },
            midnight: { '--bg-color': '#000000', '--nav-color': '#111111', '--accent-color': '#a855f7' },
            cherry:   { '--bg-color': '#2d0a0e', '--nav-color': '#4a0e16', '--accent-color': '#ff4b5c' },
            electric: { '--bg-color': '#0a0a0a', '--nav-color': '#343D34', '--accent-color': '#00ff41' },
            seahawks: { '--bg-color': '#69BE28', '--nav-color': '#667D7D', '--accent-color': '#00428A' }
        };
        const saved = localStorage.getItem('userTheme') || 'ocean';
        const root = document.documentElement;
        const theme = themes[saved] || themes.ocean;
        for (let prop in theme) { root.style.setProperty(prop, theme[prop]); }

        const isCloaked = localStorage.getItem('isCloaked');
        if (isCloaked === 'true') {
            document.title = "IXL | Dashboard";
            document.addEventListener('DOMContentLoaded', () => {
                document.getElementById('favicon').href = "https://codehs.com/uploads/e80de4dd5e7e702da78e6a41d58a0251";
            });
        } else {
            document.title = "Home | Fungi";
            document.addEventListener('DOMContentLoaded', () => {
                document.getElementById('favicon').href = "https://codehs.com/uploads/dbf77e4f4711feb9506d37e52b30a2dd";
            });
        }
    })();
    </script>

}

/* random content */
.content {
    padding: 40px;
}

/* blur background */
body.popup-open > .content,
body.popup-open > nav {
    filter: blur(6px);
}
.updateDiv {
    filter: none !important;
}
/* overlay */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(4px);

    opacity: 0;
    visibility: hidden;
    transition: opacity 0.25s ease;

    z-index: 50;
}

/* popup */
.updateDiv {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.9);

    background: var(--bg-color);
    color: white;

    padding: 20px;
    border-radius: 12px;
    border: 2px solid var(--accent-color);

    width: fit-content;
    max-width: 90vw;

    opacity: 0;
    visibility: hidden;
    transition: all 0.25s ease;

    z-index: 1000;
}

/* active state */
.overlay.active {
    opacity: 1;
    visibility: visible;
}

.updateDiv.active {
    opacity: 1;
    visibility: visible;
    transform: translate(-50%, -50%) scale(1);
}

/* button */
button {
    margin-top: 15px;
    padding: 8px 12px;
    border: none;
    border-radius: 6px;
    background: var(--accent-color);
    color: black;
    cursor: pointer;
}

function changeText() {
    const rndmText = document.getElementById('rndmText');
    const rndmImg = document.getElementById('rndmImage'); // Ensure you have <img id="rndmImage"> in HTML
    
    rndmText.classList.add('text-hidden');

    setTimeout(() => {
        // Pick a random object from the list
        let choice = content[Math.floor(Math.random() * content.length)];
        let displayText = choice.text;
        
        // Handle Battery Placeholder
        if (displayText.includes("BATTERY_PLACEHOLDER")) {
            displayText = "Your battery's totally not at " + batteryPlaceholder + "% percent.🤭";
        }
        
        // Update Text
        rndmText.innerText = displayText;

        // Optional Image Logic
        if (choice.url) {
            rndmImg.src = choice.url;
            rndmImg.style.display = "block"; // Show image if URL exists
        } else {
            rndmImg.style.display = "none";  // Hide image if URL is null/empty
        }

        void rndmText.offsetWidth; 
        rndmText.classList.remove('text-hidden');
    }, 200);
}

<script>
const overlay = document.getElementById("overlay");
const updateBox = document.getElementById("updateBox");
const closeBtn = document.getElementById("closeBtn");

function openPopup() {
    document.body.classList.add("popup-open");
    overlay.classList.add("active");
    updateBox.classList.add("active");
}

function closePopup() {
    overlay.classList.remove("active");
    updateBox.classList.remove("active");
    document.body.classList.remove("popup-open");
}

overlay.addEventListener("click", closePopup);
closeBtn.addEventListener("click", closePopup);


openPopup();
</script>
