<div class="content" style="margin-top: 50px;">
    <h2 class="glow-text">Fungi Love Tester</h2>
    
    <div style="display: flex; gap: 10px; margin-bottom: 20px; justify-content: center;">
        <input type="text" id="name1" placeholder="Person 1 Name" style="padding: 10px; border-radius: 5px; border: none;">
        <input type="text" id="name2" placeholder="Person 2 Name" style="padding: 10px; border-radius: 5px; border: none;">
    </div>

    <button class="theme-btn" onclick="calculateLove()">Calculate Compatibility</button>

    <div class="heart-container" style="position: relative; margin-top: 30px; width: 250px; height: 250px; display: flex; align-items: center; justify-content: center;">
        <svg id="heart-svg" viewBox="0 0 32 29.6" style="width: 100%; height: 100%; overflow: visible; transform-origin: center; animation: heartPulse 2s infinite ease-in-out; backdrop-filter:blur(5px)">
            <defs>
                <clipPath id="heartClip">
                    <path d="M23.6,0c-3.4,0-6.3,2.7-7.6,5.6C14.7,2.7,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.4,9.5,11.9,16,21.2
                    c6.1-9.3,16-12.1,16-21.2C32,3.8,28.2,0,23.6,0z" />
                </clipPath>
            </defs>
            <path d="M23.6,0c-3.4,0-6.3,2.7-7.6,5.6C14.7,2.7,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.4,9.5,11.9,16,21.2
            c6.1-9.3,16-12.1,16-21.2C32,3.8,28.2,0,23.6,0z" fill="#333" />
            <rect id="heart-fill" x="0" y="30" width="32" height="32" fill="var(--accent-color)" clip-path="url(#heartClip)" style="transition: y 1.5s cubic-bezier(0.4, 0, 0.2, 1);" />
        </svg>
        <div id="love-percent" style="position: absolute; font-size: 2.5rem; font-weight: bold; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); pointer-events: none; z-index: 10;">0%</div>
    </div>
</div>

<style>
@keyframes heartPulse {
    0% { transform: scale(1); }
    15% { transform: scale(1.1); }
    30% { transform: scale(1); }
    45% { transform: scale(1.15); }
    100% { transform: scale(1); }
}
</style>

<script>
let previousValue = 0;

function calculateLove() {
    const n1 = document.getElementById('name1').value.trim().toLowerCase();
    const n2 = document.getElementById('name2').value.trim().toLowerCase();

    if (!n1 || !n2) return;

    // Seeded random logic
    const combined = [n1, n2].sort().join('');
    let hash = 0;
    for (let i = 0; i < combined.length; i++) {
        hash = ((hash << 5) - hash) + combined.charCodeAt(i);
        hash |= 0;
    }
    const newValue = Math.abs(hash % 101);

    // 1. Move liquid
    const fill = document.getElementById('heart-fill');
    fill.setAttribute('y', 30 - (30 * (newValue / 100)));

    // 2. Adjust Heartbeat Speed (Fast for love, slow for meh)
    const svg = document.getElementById('heart-svg');
    const speed = 2.0 - (1.5 * (newValue / 100)); 
    svg.style.animationDuration = speed + 's';

    // 3. Glide the numbers
    animateValue(previousValue, newValue, 1500);
    
    previousValue = newValue;
}

function animateValue(start, end, duration) {
    const obj = document.getElementById("love-percent");
    let startTimestamp = null;
    const step = (timestamp) => {
        if (!startTimestamp) startTimestamp = timestamp;
        const progress = Math.min((timestamp - startTimestamp) / duration, 1);
        const easeProgress = 1 - Math.pow(1 - progress, 3); // Smooth ease-out
        const current = Math.floor(easeProgress * (end - start) + start);
        obj.innerHTML = current + "%";
        if (progress < 1) {
            window.requestAnimationFrame(step);
        }
    };
    window.requestAnimationFrame(step);
}
</script>
