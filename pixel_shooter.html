<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title id="page-title">Pixel Shooter | Fungi</title>
        <link id="favicon" rel="icon" type="image/png" href="https://codehs.com/uploads/dbf77e4f4711feb9506d37e52b30a2dd">
    

<script> 
    setTheme('ocean') // runs BEFORE theme.js loads 
</script>
<script src="theme.js"></script>

    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1, minimum-scale=1, maximum-scale=1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    
    <link rel="stylesheet" href="https://274019683-173520394482650759.preview.editmysite.com/uploads/b/139890129-131715539788281629/files/style-mobile.6e9cd.css">
    
        <style>
        /* Force the Dark Navy Blue background */


        /* Styling for the Return Button */
        .back-launcher-btn {
            position: fixed;
            bottom: 8px; /* Moved slightly up so it's not hidden on mobile */
            left: 10px;
            z-index: 10000; /* Ensure it stays above the game canvas */
            padding: 8px 25px;
            background-color: rgba(0,0,25,0.5);
            color: white;
            border: 2px solid white;
            border-radius: 50px;
            font-family: 'Comic Sans MS', 'Comic Sans', cursive;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            backdrop-filter: blur(4px); 
            transition: transform 0.2s;
        }

        .back-launcher-btn:hover {
            transform: scale(1.1);
            background-color: rgba(0,0,50,0.3);
        }

        #GameCanvas {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <!-- Back to Menu Button -->
    <button class="back-launcher-btn" onclick="window.location.href='launcher.html'">
        ← Return to Launcher
    </button>

    <canvas id="GameCanvas" oncontextmenu="event.preventDefault()" tabindex="0"></canvas>
    
    <div id="splash">
        <div class="progress-bar stripes">
            <span style="width: 0%"></span>
        </div>
    </div>

    <!-- Auto-Return Logic: If refreshed, go to menu -->
    <script>
        if (performance.navigation.type === performance.navigation.TYPE_RELOAD) {
            window.location.href = "launcher.html";
        }
    </script>
    <!-- Game Scripts -->
    <script src="https://274019683-173520394482650759.preview.editmysite.com/uploads/b/139890129-131715539788281629/files/src/settings.5beaa.js" charset="utf-8"></script>
    <script src="https://274019683-173520394482650759.preview.editmysite.com/uploads/b/139890129-131715539788281629/files/main.93472.js" charset="utf-8"></script>

    <script>
        (function () {
            if (typeof VConsole !== 'undefined') {
                window.vConsole = new VConsole();
            }

            var splash = document.getElementById('splash');
            splash.style.display = 'block';

            function loadScript(moduleName, callback) {
                var script = document.createElement('script');
                script.async = true;
                script.src = moduleName;
                script.onload = function () {
                    document.body.removeChild(script);
                    if (callback) callback();
                };
                document.body.appendChild(script);
            }

            var debug = window._CCSettings && window._CCSettings.debug;
            var cocosSrc = debug 
                ? 'cocos2d-js.js' 
                : 'https://274019683-173520394482650759.preview.editmysite.com/uploads/b/139890129-131715539788281629/files/cocos2d-js-min.55149.js';

            loadScript(cocosSrc, function () {
                if (window.CC_PHYSICS_BUILTIN || window.CC_PHYSICS_CANNON) {
                    loadScript(debug ? 'physics.js' : 'physics-min.js', window.boot);
                } else {
                    if (typeof window.boot === 'function') {
                        window.boot();
                    }
                }
            });

        })();

        // Ensure gameapi exists before calling init
        document.addEventListener("DOMContentLoaded", function () {
            if (typeof gameapi !== 'undefined' && gameapi.init) {
                gameapi.init();
            } else {
                console.warn("gameapi is not defined.");
            }
        });
    </script>

</body>
</html>
