<!DOCTYPE html>
<html>
<head>
    <title>IXL | Skill plans</title>
    <link id="favicon" rel="icon" type="image/png" href="https://codehs.com/uploads/b9709218b992bb723f9a5aa69426b5f1">

    <script>
        (function() {
            // Theme Definitions
            const themes = {
                ocean:    { '--bg-color': '#0f172a', '--nav-color': '#1e293b', '--accent-color': '#38bdf8' },
                forest:   { '--bg-color': '#064e3b', '--nav-color': '#065f46', '--accent-color': '#34d399' },
                sunset:   { '--bg-color': '#451a03', '--nav-color': '#78350f', '--accent-color': '#fbbf24' },
                midnight: { '--bg-color': '#000000', '--nav-color': '#111111', '--accent-color': '#a855f7' },
                cherry:   { '--bg-color': '#2d0a0e', '--nav-color': '#4a0e16', '--accent-color': '#ff4b5c' },
                electric: { '--bg-color': '#0a0a0a', '--nav-color': '#343D34', '--accent-color': '#00ff41' },
                seahawks: { '--bg-color': '#69BE28', '--nav-color': '#667D7D', '--accent-color': '#00428A' }
            };

            // Apply Theme
            const saved = localStorage.getItem('userTheme') || 'ocean';
            const root = document.documentElement;
            const theme = themes[saved] || themes.ocean;
            for (let prop in theme) { 
                root.style.setProperty(prop, theme[prop]); 
            }

            // Cloak Logic
            const isCloaked = localStorage.getItem('isCloaked');
            if (isCloaked === 'true') {
                document.title = "IXL | Dashboard";
            } else {
                document.title = "Snow Rider 3D | Fungi";
            }
        })();

        document.addEventListener('DOMContentLoaded', () => {
            const isCloaked = localStorage.getItem('isCloaked');
            const favicon = document.getElementById('favicon');
            if (favicon) {
                favicon.href = isCloaked === 'true' 
                    ? "https://codehs.com/uploads/b9709218b992bb723f9a5aa69426b5f1" 
                    : "https://codehs.com/uploads/dbf77e4f4711feb9506d37e52b30a2dd";
            }
        });
    </script>
    <link rel="stylesheet" href="style.css">

    <style>
        :root {
            /* Standardized font declaration */
            font-family: 'Comic Sans MS', 'Comic Sans', cursive;
        }


    </style>
</head>
<body>
    <div id="loader-container" style="background-color: var(--bg-color, #111); display: flex; flex-direction: column; justify-content: center; align-items: center; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 999999;">
        <!-- New Advanced Animated Loader -->
        <div class="loader">
            <div class="text"><span>LOADING</span></div>
            <div class="text"><span>LOADING</span></div>
            <div class="text"><span>LOADING</span></div>
            <div class="text"><span>LOADING</span></div>
            <div class="text"><span>LOADING</span></div>
            <div class="text"><span>LOADING</span></div>
            <div class="text"><span>LOADING</span></div>
            <div class="text"><span>LOADING</span></div>
            <div class="text"><span>LOADING</span></div>
        </div>

        <!-- Centered Subtext -->
        <div class="loading-text" style="text-align: center; margin-top: 20px; color: var(--accent-color); font-family: 'Comic Sans MS', cursive;">
            Loading... <br> 
            Click the lowest button on the menu, then click the flag, to change language <br>
            Loading Animation from 
            <a href="https://uiverse.io/andrew-manzyk/unlucky-mouse-21" target="_blank">UIverse</a>
        </div>
    </div>



    <script>
        const url = "https://raw.githubusercontent.com/gibberish2/Fungifiles/main/cuttherope.html";

        async function loadTemplate() {
            try {
                let response = await fetch(url);
                if (response.ok) {
                    let html = await response.text();
                    
                    document.open();
                    document.write(html);
                    document.close();

                    const style = document.createElement('style');
                    style.textContent = `
                        .back-launcher-btn {
                            position: fixed;
                            bottom: 8px;
                            left: 10px;
                            z-index: 100000;
                            padding: 8px 25px;
                            background-color: rgba(0, 0, 25, 0.5);
                            color: white;
                            border: 2px solid white;
                            border-radius: 50px;
                            font-family: 'Comic Sans MS', 'Comic Sans', cursive;
                            font-weight: bold;
                            cursor: pointer;
                            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
                            backdrop-filter: blur(4px);
                            transition: transform 0.2s;
                        }
                        .back-launcher-btn:hover { transform: scale(1.1); background-color: rgba(0, 0, 50, 0.3); }
                    `;
                    document.head.appendChild(style);

                    const backButton = document.createElement('button');
                    backButton.className = 'back-launcher-btn';
                    backButton.innerHTML = '← Return to Launcher';
                    backButton.onclick = () => { window.location.href = 'launcher.html'; };
                    document.body.appendChild(backButton);

                } else {
                    throw new Error("CDN response not OK");
                }
            } catch (e) {
                console.error("Load failed:", e);
                document.body.innerHTML = "<h1 style='color:white; text-align:center; padding-top:50px; font-family: cursive;'>Failed to load game.</h1>";
            }
        }

        loadTemplate();
    </script>
</body>
</html>
