<head>

    setTheme('ocean')

<link rel="stylesheet" href="style.css">

<style>
body {
    background-color: var(--bg-color);
    color: white;
    margin: 0;
    font-family: 'Comic Sans MS', 'Comic Sans', cursive !important;
}

* {
    font-family: 'Comic Sans MS', 'Comic Sans', cursive !important;
}

.content {
    text-align: center;
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.glow-text {
    color: #fff;
    text-shadow: 0 0 7px var(--accent-color), 0 0 10px var(--accent-color), 0 0 21px var(--accent-color);
}

.image-container {
    background-color: rgba(128, 128, 128, 0.4);
    border-radius: 15px;
    padding: 20px;
    display: inline-block;
    margin-bottom: 30px;
    border: 2px solid var(--accent-color);
}

.button-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
    width: 90%;
    max-width: 1000px;
    margin-bottom: 50px;
}

.music-card {
    background-size: cover;
    background-position: center;
    color: white;
    padding: 40px 10px;
    border: none;
    cursor: pointer;
    border-radius: 12px;
    font-size: 16px;
    text-shadow: 0 0 5px black;
}

.music-card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px var(--accent-color);
}

/* Popup */
.popup-player {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 300px;
    background: #111;
    border: 2px solid var(--accent-color);
    border-radius: 10px;
    padding: 10px;
    display: none;
    z-index: 999;
}

.popup-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.popup-controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 10px;
}

#playlist {
    margin-top: 10px;
    max-height: 200px;
    overflow-y: auto;
}

.track {
    padding: 5px;
    cursor: pointer;
    border-bottom: 1px solid #333;
}

.track:hover {
    background: #222;
}

/* Hidden YouTube player */
#ytplayer {
    position: fixed;
    width: 1px;
    height: 1px;
    opacity: 0.01;
    pointer-events: none;
}
</style>
</head>

<body>

        <a href="launcher.html" class="nav-link" title = "Brings you to the games page" alt = "games page navigation button">Games</a>

<div class="content">
    <h1 class="glow-text">Fungi Jams</h1>

    <div class="image-container">
        <div id="now-playing">Select a song</div>
    </div>

    <div id="main-playlist" class="button-grid"></div> 
</div>

<!-- POPUP -->
<div id="music-popup" class="popup-player">
    <div class="popup-header">
        <span id="popup-title">Nothing Playing</span>
        <button onclick="togglePopup(false)">×</button>
    </div>

    <div class="popup-controls">
        <button onclick="skip(-10)">«</button>
        <button onclick="togglePlay()">▶</button>
        <button onclick="skip(10)">»</button>
    </div>

    <div id="playlist"></div>

    <div style="margin-top:10px;">
        <input type="range" min="0" max="1" step="0.01" value="0.5" oninput="adjustVolume(this.value)">
    </div>
</div>

<!-- YouTube -->
<div id="ytplayer"></div>
<script src="https://www.youtube.com/iframe_api"></script>

<script>
let player;
let queue = [];
let currentIndex = 0;
let isPlaying = false;
let playerReady = false;

function onYouTubeIframeAPIReady() {
    player = new YT.Player('ytplayer', {
        height: '1',
        width: '1',
        videoId: '',
        playerVars: {
            autoplay: 1,
            playsinline: 1
        },
        events: {
            onReady: () => playerReady = true,
            onStateChange: onStateChange
        }
    });
}

function onStateChange(e) {
    if (e.data === YT.PlayerState.ENDED) {
        currentIndex++;
        if (currentIndex < queue.length) {
            playFromQueue();
        }
    }
}

function playSong(title, url) {
    let id = extractYouTubeID(url);

    queue.push({ id, title });

    if (queue.length === 1) {
        currentIndex = 0;
        playFromQueue();
    }

    renderQueue();
    togglePopup(true);
}

function playFromQueue() {
    let item = queue[currentIndex];
    if (!item || !playerReady) return;

    document.getElementById("now-playing").textContent = item.title;
    document.getElementById("popup-title").textContent = item.title;

    player.loadVideoById(item.id);

    setTimeout(() => {
        player.playVideo();
    }, 300);

    isPlaying = true;
}

function extractYouTubeID(url) {
    let match = url.match(/(?:v=|youtu\.be\/)([^&]+)/);
    return match ? match[1] : url;
}

function togglePlay() {
    if (isPlaying) {
        player.pauseVideo();
    } else {
        player.playVideo();
    }
    isPlaying = !isPlaying;
}

function skip(seconds) {
    let t = player.getCurrentTime();
    player.seekTo(t + seconds, true);
}

function adjustVolume(v) {
    player.setVolume(v * 100);
}

function togglePopup(show) {
    document.getElementById("music-popup").style.display = show ? "block" : "none";
}

function renderQueue() {
    let el = document.getElementById("playlist");
    el.innerHTML = "";

    queue.forEach((song, i) => {
        let div = document.createElement("div");
        div.className = "track";
        div.textContent = (i === currentIndex ? "▶ " : "") + song.title;

        div.onclick = () => {
            currentIndex = i;
            playFromQueue();
        };

        el.appendChild(div);
    });
}
</script>

<script src="music.js"></script>
<script src="spores.js"></script>

<script>
window.addEventListener('DOMContentLoaded', () => {
    const mainGrid = document.getElementById('main-playlist');

    if (mainGrid && typeof songList !== 'undefined') {
        songList.forEach(song => {
            const btn = document.createElement('button');
            btn.className = "music-card";

            btn.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('${song.image}')`;
            btn.innerHTML = song.title;

            btn.onclick = () => playSong(song.title, song.url);

            mainGrid.appendChild(btn);
        });
    }
});
</script>
