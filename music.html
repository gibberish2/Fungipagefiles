<!DOCTYPE html>
<html>
<head>
    <title>Music | Fungi</title>
    <link id="favicon" rel="icon" type="image/png" href="https://codehs.com/uploads/dbf77e4f4711feb9506d37e52b30a2dd">

<script> 
    setTheme('ocean')
</script>
<script src="theme.js"></script>
<link rel="stylesheet" href="style.css">

<style>
body {
    background-color: var(--bg-color);
    color: white;
    margin: 0;
    font-family: 'Comic Sans MS', cursive;
}

.content {
    text-align: center;
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.glow-text {
    color: #fff;
    text-shadow: 0 0 7px var(--accent-color), 0 0 21px var(--accent-color);
}

.image-container {
    background-color: rgba(128,128,128,0.4);
    border-radius: 15px;
    padding: 20px;
    border: 2px solid var(--accent-color);
    margin-bottom: 20px;
}

/* GRID */
.button-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
    width: 90%;
    max-width: 1000px;
}

/* SONG CARDS */
.music-card {
    height: 120px;
    border-radius: 10px;
    border: 1px solid var(--accent-color);
    color: white;
    cursor: pointer;
    background-size: cover;
    background-position: center;
    font-weight: bold;
    transition: transform 0.2s ease;
}

.music-card:hover {
    transform: scale(1.05);
}

/* POPUP UI */
.popup-player {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 320px;
    background: var(--nav-color);
    border: 2px solid var(--accent-color);
    border-radius: 12px;
    display: none;
    padding: 10px;
    z-index: 9999;
}

.popup-header {
    display: flex;
    justify-content: space-between;
    cursor: move;
    font-weight: bold;
}

.popup-body {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.popup-thumb {
    width: 100%;
    height: 160px;
    object-fit: cover;
    border-radius: 8px;
    border: 1px solid var(--accent-color);
}

.ctrl-btn {
    padding: 5px 10px;
    cursor: pointer;
    font-family: 'Comic Sans MS', cursive;
}

.search-box {
    width: 100%;
    padding: 5px;
    font-family: 'Comic Sans MS', cursive;
}


/* Hidden YouTube player */
#ytplayer {
    position: fixed;
    width: 1px;
    height: 1px;
    opacity: 0.01;
    pointer-events: none;
}
</style>
</head>

<body>

<nav class="navbar">
    <div class="nav-container">
        <a href="home.html" class="nav-link" title = "Brings you to the home page" alt = "home page navigation button">Home</a>
        <a href="launcher.html" class="nav-link" title = "Brings you to the games page" alt = "games page navigation button">Games</a>
        <a href="tools.html" class="nav-link" title = "Brings you to the tools page" alt = "tools page navigation button">Tools</a>
        <a href="music.html" class="nav-link active" title = "Brings you to the music page" alt = "music page navigation button">Music</a>
        <a href="about.html" class="nav-link" title = "Brings you to the about page" alt = "about page navigation button">About</a>
        <a href="settings.html" class="nav-link" title = "Brings you to the settings page" alt = "settings page navigation button">Settings</a>
    </div>
</nav>

<div class="content">
    <h1 class="glow-text">Fungi Jams</h1>

    <div class="image-container">
        <div id="now-playing">Select a song</div>
    </div>

    <div id="main-playlist" class="button-grid"></div>
</div>

<!-- POPUP -->
<div id="music-popup" class="popup-player">
    <div class="popup-header">
        <span id="popup-title">Nothing Playing</span>
        <button onclick="togglePopup(false)">×</button>
    </div>

    <div class="popup-body">
        <img id="popup-thumb" class="popup-thumb" />

        <input id="search-input" class="search-box" placeholder="Search YouTube..." />
        <button onclick="searchYouTube()" class="ctrl-btn">Search & Play</button>

        <div>
            <button onclick="skip(-10)" class="ctrl-btn">«</button>
            <button id="master-play-btn" onclick="togglePlay()" class="ctrl-btn">▶</button>
            <button onclick="skip(10)" class="ctrl-btn">»</button>
        </div>

        <input type="range" id="volume-slider" min="0" max="1" step="0.01"
               oninput="adjustVolume(this.value)">
    </div>
</div>

<script src="music.js"></script>
<script src="spores.js"></script>

<!-- Cloudflare -->
<script defer src="https://static.cloudflareinsights.com/beacon.min.js"
data-cf-beacon='{"token": "2fb5e9188fd9485ca71dcc4ab49bf350"}'></script>

</body>
</html>
