<!DOCTYPE html>
<html>
<head>
<title>Crossy Road | Fungi</title>
    <link rel="icon" type="image/png" href="https://codehs.com/uploads/dbf77e4f4711feb9506d37e52b30a2dd">

<body>
    <script>
        const url = "https://raw.githubusercontent.com/gibberish2/Fungifiles/main/crossyroad.htm";

        async function loadTemplate() {
            try {
                let response = await fetch(url);
                if (response.ok) {
                    let html = await response.text();
                    
                    document.open();
                    document.write(html);
                    document.close();

                    // 1. Inject the CSS into the NEW document
                    const style = document.createElement('style');
                    style.textContent = `
                        .back-launcher-btn {
                            position: fixed;
                            bottom: 8px;
                            left: 10px;
                            z-index: 100000;
                            padding: 8px 25px;
                            background-color: rgba(0, 0, 25, 0.5);
                            color: white;
                            border: 2px solid white;
                            border-radius: 50px;
                            font-family: 'Comic Sans MS', 'Comic Sans', cursive;
                            font-weight: bold;
                            cursor: pointer;
                            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
                            backdrop-filter: blur(4px);
                            transition: transform 0.2s;
                        }
                        .back-launcher-btn:hover {
                            transform: scale(1.1);
                            background-color: rgba(0, 0, 50, 0.3);
                        }
                    `;
                    document.head.appendChild(style);

                    // 2. Create the button and apply the class
                    const backButton = document.createElement('button');
                    backButton.className = 'back-launcher-btn'; // Matches the CSS above
                    backButton.innerHTML = '← Return to Launcher';
                    
                    backButton.onclick = function() {
                        window.location.href = 'launcher.html';
                    };
                    document.body.appendChild(backButton);

                } else {
                    throw new Error("CDN response not OK");
                }
            } catch (e) {
                console.error("Load failed:", e);
                document.body.innerHTML = "<h1>Failed to load game.</h1>";
            }
        }

        loadTemplate();
    </script>

</body>
</html>
